<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Password</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.22);
      padding: 34px 30px;
    }

    h1 {
      margin: 0 0 10px 0;
      text-align: center;
      color: #111827;
    }

    .subtitle {
      margin: 0 0 24px 0;
      text-align: center;
      color: #6b7280;
      line-height: 1.6;
      font-size: 15px;
    }

    .field-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 700;
      color: #1f2937;
      font-size: 14px;
    }

    input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .submit-btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: #2563eb;
      cursor: pointer;
      margin-top: 8px;
    }

    .submit-btn:hover { background: #1d4ed8; }
    .submit-btn:disabled { background: #93c5fd; cursor: not-allowed; }

    .message {
      display: none;
      margin-top: 18px;
      padding: 13px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.success {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .message.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .small {
      color: #6b7280;
      font-size: 13px;
      margin-top: 18px;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Create Your Password</h1>
    <p class="subtitle">
      Your signup request has been approved. Enter your email address and create your password to activate your account.
    </p>

    <form id="createPasswordForm">
      <div class="field-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required />
      </div>

      <div class="field-group">
        <label for="password">New Password</label>
        <input type="password" id="password" minlength="8" required />
      </div>

      <div class="field-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" minlength="8" required />
      </div>

      <button type="submit" id="submitBtn" class="submit-btn">Create Account</button>
    </form>

    <div id="messageBox" class="message"></div>

    <div class="small">
      Your request must already be approved before account creation will work.
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      updateDoc,
      setDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDE0nhogdC9LHPEhSlUF1AqnXmwPU64cXg",
      authDomain: "company-discipline-portal.firebaseapp.com",
      projectId: "company-discipline-portal",
      storageBucket: "company-discipline-portal.firebasestorage.app",
      messagingSenderId: "991390225414",
      appId: "1:991390225414:web:32b8d71a8fe2a323161f87"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const form = document.getElementById("createPasswordForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const submitBtn = document.getElementById("submitBtn");
    const messageBox = document.getElementById("messageBox");

    const params = new URLSearchParams(window.location.search);
    const requestId = params.get("requestId");
    const employeeId = params.get("employeeId");

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.className = `message ${type}`;
    }

    function normalizeEmail(value) {
      return value.trim().toLowerCase();
    }

    async function loadApprovalData() {
      if (!requestId || !employeeId) {
        throw new Error("This password setup link is invalid.");
      }

      const requestRef = doc(db, "signupRequests", requestId);
      const employeeRef = doc(db, "employees", employeeId);

      const [requestSnap, employeeSnap] = await Promise.all([
        getDoc(requestRef),
        getDoc(employeeRef)
      ]);

      if (!requestSnap.exists()) {
        throw new Error("Signup request not found.");
      }

      if (!employeeSnap.exists()) {
        throw new Error("Employee record not found.");
      }

      const requestData = requestSnap.data();
      const employeeData = employeeSnap.data();

      if ((requestData.status || "").toLowerCase() !== "approved") {
        throw new Error("This signup request has not been approved.");
      }

      if (requestData.accountCreated === true || employeeData.accountCreated === true) {
        throw new Error("This account has already been created.");
      }

      if (employeeData.signupApproved !== true || employeeData.loginEnabled !== true) {
        throw new Error("This employee record is not enabled for account creation.");
      }

      return { requestRef, employeeRef, requestData, employeeData };
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      showMessage("", "error");
      messageBox.style.display = "none";

      const email = normalizeEmail(emailInput.value);
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (!email || !password || !confirmPassword) {
        showMessage("Please complete all fields.", "error");
        return;
      }

      if (password.length < 8) {
        showMessage("Your password must be at least 8 characters long.", "error");
        return;
      }

      if (password !== confirmPassword) {
        showMessage("Your passwords do not match.", "error");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Creating Account...";

      try {
        const { requestRef, employeeRef, requestData, employeeData } = await loadApprovalData();

        const approvedEmail = normalizeEmail(requestData.email || employeeData.email || "");

        if (!approvedEmail || approvedEmail !== email) {
          throw new Error("The email address does not match the approved signup request.");
        }

        const credential = await createUserWithEmailAndPassword(auth, email, password);
        const uid = credential.user.uid;

        await setDoc(doc(db, "users", uid), {
          uid: uid,
          employeeId: employeeId,
          username: employeeData.username || requestData.username || "",
          email: email,
          departmentId: employeeData.departmentId || requestData.departmentId || "",
          departmentName: employeeData.departmentName || requestData.departmentName || "",
          role: employeeData.role || requestData.role || "Employee",
          permissions: {
            canViewOwnWriteups: true,
            canAppeal: true,
            canIssueWriteups: (employeeData.role || "").toLowerCase() === "manager",
            canReviewAppeals: (employeeData.role || "").toLowerCase() === "manager",
            canEditWriteups: (employeeData.role || "").toLowerCase() === "manager",
            canDeleteWriteups: false
          },
          status: "active",
          createdAt: serverTimestamp()
        });

        await updateDoc(employeeRef, {
          accountCreated: true,
          lastUpdated: serverTimestamp()
        });

        await updateDoc(requestRef, {
          accountCreated: true,
          passwordSetupSent: true,
          completedAt: serverTimestamp(),
          status: "completed"
        });

        showMessage("Your account has been created successfully. You can now sign in.", "success");
        form.reset();

        setTimeout(() => {
          window.location.href = "login.html";
        }, 1800);
      } catch (error) {
        console.error(error);
        showMessage(error.message || "Account creation failed.", "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Create Account";
      }
    });
  </script>
</body>
</html>
