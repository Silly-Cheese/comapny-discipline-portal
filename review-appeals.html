<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review Appeals</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f6fb;
      color: #111827;
    }

    .topbar {
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
      color: white;
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .topbar h1 {
      margin: 0;
      font-size: 26px;
    }

    .topbar p {
      margin: 6px 0 0;
      color: #dbeafe;
      font-size: 14px;
    }

    .topbar-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .topbar-btn {
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }

    .topbar-btn.primary {
      background: white;
      color: #1d4ed8;
    }

    .topbar-btn.secondary {
      background: rgba(255,255,255,0.15);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .message {
      display: none;
      margin-bottom: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .message.success {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .card {
      background: white;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      padding: 24px;
      margin-bottom: 20px;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .card-subtitle {
      margin: 0 0 20px;
      color: #6b7280;
      line-height: 1.5;
      font-size: 14px;
    }

    .appeal-list {
      display: grid;
      gap: 16px;
    }

    .appeal-item {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
      background: #fafafa;
    }

    .appeal-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .appeal-title {
      font-size: 18px;
      font-weight: 700;
      color: #111827;
    }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #e5edff;
      color: #1d4ed8;
    }

    .pill.warning {
      background: #fef3c7;
      color: #92400e;
    }

    .pill.success {
      background: #dcfce7;
      color: #166534;
    }

    .pill.danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .detail-box {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
    }

    .detail-box.full {
      grid-column: 1 / -1;
    }

    .detail-label {
      font-size: 12px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 5px;
    }

    .detail-value {
      font-size: 14px;
      color: #111827;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .decision-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 700;
      color: #1f2937;
      font-size: 14px;
    }

    select,
    textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 15px;
      outline: none;
      background: white;
      font-family: Arial, sans-serif;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    select:focus,
    textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }

    .btn.primary {
      background: #2563eb;
      color: white;
    }

    .btn.secondary {
      background: #e5edff;
      color: #1d4ed8;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .empty-state {
      color: #6b7280;
      font-size: 14px;
      padding: 6px 0;
    }

    .hidden {
      display: none !important;
    }

    .loading-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #f3f6fb;
      color: #374151;
      font-size: 18px;
      font-weight: 700;
    }

    @media (max-width: 760px) {
      .detail-grid,
      .decision-grid {
        grid-template-columns: 1fr;
      }

      .container {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="loadingScreen" class="loading-screen">Loading appeals...</div>

  <div id="app" class="hidden">
    <div class="topbar">
      <div>
        <h1>Review Appeals</h1>
        <p>Review pending employee appeals and record a final decision.</p>
      </div>

      <div class="topbar-actions">
        <button id="dashboardBtn" class="topbar-btn secondary">Back to Dashboard</button>
        <button id="logoutBtn" class="topbar-btn primary">Log Out</button>
      </div>
    </div>

    <div class="container">
      <div id="messageBox" class="message"></div>

      <div class="card">
        <h2>Pending Appeals</h2>
        <p class="card-subtitle">
          Managers may review appeals in their own department. Owners and admins may review across departments.
        </p>

        <div id="appealList" class="appeal-list"></div>
        <div id="emptyState" class="empty-state">No pending appeals were found.</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      collection,
      getDocs,
      query,
      where,
      updateDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDE0nhogdC9LHPEhSlUF1AqnXmwPU64cXg",
      authDomain: "company-discipline-portal.firebaseapp.com",
      projectId: "company-discipline-portal",
      storageBucket: "company-discipline-portal.firebasestorage.app",
      messagingSenderId: "991390225414",
      appId: "1:991390225414:web:32b8d71a8fe2a323161f87"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loadingScreen = document.getElementById("loadingScreen");
    const appEl = document.getElementById("app");
    const messageBox = document.getElementById("messageBox");
    const dashboardBtn = document.getElementById("dashboardBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const appealList = document.getElementById("appealList");
    const emptyState = document.getElementById("emptyState");

    let currentPortalUser = null;

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.className = `message ${type}`;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function clearMessage() {
      messageBox.textContent = "";
      messageBox.className = "message";
    }

    function normalizeRole(role) {
      return (role || "").toLowerCase();
    }

    function hasReviewAccess(userData) {
      const role = normalizeRole(userData.role);
      return userData.permissions?.canReviewAppeals === true || role === "manager" || role === "admin" || role === "owner" || role === "administrator";
    }

    function canCrossDepartments(userData) {
      const role = normalizeRole(userData.role);
      return role === "admin" || role === "owner" || role === "administrator";
    }

    function getPillClass(status) {
      const value = (status || "").toLowerCase();

      if (value === "approved" || value === "reviewed" || value === "completed") {
        return "pill success";
      }

      if (value === "denied") {
        return "pill danger";
      }

      if (value === "pending") {
        return "pill warning";
      }

      return "pill";
    }

    async function loadPortalUser(firebaseUser) {
      const userRef = doc(db, "users", firebaseUser.uid);
      const userSnap = await getDoc(userRef);

      if (!userSnap.exists()) {
        await signOut(auth);
        window.location.href = "login.html";
        return null;
      }

      const userData = userSnap.data();

      if ((userData.status || "").toLowerCase() !== "active") {
        await signOut(auth);
        window.location.href = "login.html";
        return null;
      }

      if (!hasReviewAccess(userData)) {
        showMessage("You do not have permission to review appeals.", "error");
      }

      return userData;
    }

    function createAppealCard(docId, data) {
      const wrapper = document.createElement("div");
      wrapper.className = "appeal-item";
      wrapper.innerHTML = `
        <div class="appeal-top">
          <div class="appeal-title">${data.employeeUsername || "Employee"}</div>
          <span class="${getPillClass(data.status || "pending")}">${data.status || "pending"}</span>
        </div>

        <div class="detail-grid">
          <div class="detail-box">
            <div class="detail-label">Employee ID</div>
            <div class="detail-value">${data.employeeId || "—"}</div>
          </div>

          <div class="detail-box">
            <div class="detail-label">Department</div>
            <div class="detail-value">${data.departmentName || "—"}</div>
          </div>

          <div class="detail-box">
            <div class="detail-label">Write-Up ID</div>
            <div class="detail-value">${data.writeUpId || "—"}</div>
          </div>

          <div class="detail-box">
            <div class="detail-label">Employee Email</div>
            <div class="detail-value">${data.employeeEmail || "—"}</div>
          </div>

          <div class="detail-box full">
            <div class="detail-label">Appeal Reason</div>
            <div class="detail-value">${data.appealReason || "No reason provided."}</div>
          </div>
        </div>

        <div class="decision-grid">
          <div>
            <label for="decision-${docId}">Decision</label>
            <select id="decision-${docId}">
              <option value="">Select decision</option>
              <option value="upheld">Upheld</option>
              <option value="reduced">Reduced</option>
              <option value="overturned">Overturned</option>
              <option value="denied">Denied</option>
            </select>
          </div>

          <div>
            <label for="reason-${docId}">Decision Reason</label>
            <textarea id="reason-${docId}" placeholder="Explain the decision."></textarea>
          </div>
        </div>

        <div class="btn-row">
          <button class="btn primary save-decision-btn" data-id="${docId}">Save Decision</button>
        </div>
      `;

      return wrapper;
    }

    async function loadAppeals() {
      appealList.innerHTML = "";
      emptyState.style.display = "block";
      clearMessage();

      if (!currentPortalUser || !hasReviewAccess(currentPortalUser)) {
        return;
      }

      try {
        let appealQuery;

        if (canCrossDepartments(currentPortalUser)) {
          appealQuery = query(
            collection(db, "appeals"),
            where("status", "==", "pending")
          );
        } else {
          appealQuery = query(
            collection(db, "appeals"),
            where("departmentId", "==", currentPortalUser.departmentId),
            where("status", "==", "pending")
          );
        }

        const snap = await getDocs(appealQuery);

        if (snap.empty) {
          emptyState.style.display = "block";
          return;
        }

        emptyState.style.display = "none";

        snap.forEach((docSnap) => {
          const card = createAppealCard(docSnap.id, docSnap.data());
          appealList.appendChild(card);
        });

        const buttons = appealList.querySelectorAll(".save-decision-btn");
        buttons.forEach((button) => {
          button.addEventListener("click", async () => {
            const appealId = button.getAttribute("data-id");
            await saveDecision(appealId, button);
          });
        });
      } catch (error) {
        console.error("Appeal load error:", error);
        showMessage("An unexpected error occurred while loading appeals.", "error");
      }
    }

    async function saveDecision(appealId, button) {
      clearMessage();

      const decisionSelect = document.getElementById(`decision-${appealId}`);
      const reasonInput = document.getElementById(`reason-${appealId}`);

      const decision = (decisionSelect.value || "").trim().toLowerCase();
      const decisionReason = (reasonInput.value || "").trim();

      if (!decision) {
        showMessage("Please select a decision before saving.", "error");
        return;
      }

      if (!decisionReason) {
        showMessage("Please provide a reason for the decision.", "error");
        return;
      }

      button.disabled = true;
      button.textContent = "Saving...";

      try {
        const appealRef = doc(db, "appeals", appealId);
        const appealSnap = await getDoc(appealRef);

        if (!appealSnap.exists()) {
          throw new Error("The selected appeal no longer exists.");
        }

        const appealData = appealSnap.data();
        const writeUpId = appealData.writeUpId;

        await updateDoc(appealRef, {
          status: "reviewed",
          decision: decision,
          decisionReason: decisionReason,
          reviewedBy: currentPortalUser.uid || "",
          reviewedByUsername: currentPortalUser.username || "",
          reviewedAt: serverTimestamp()
        });

        if (writeUpId) {
          const writeUpRef = doc(db, "writeUps", writeUpId);
          const writeUpSnap = await getDoc(writeUpRef);

          if (writeUpSnap.exists()) {
            const writeUpUpdates = {
              underAppeal: false,
              updatedAt: serverTimestamp()
            };

            if (decision === "overturned") {
              writeUpUpdates.status = "overturned";
            } else if (decision === "reduced") {
              writeUpUpdates.status = "reduced";
            } else if (decision === "upheld" || decision === "denied") {
              writeUpUpdates.status = "active";
            }

            await updateDoc(writeUpRef, writeUpUpdates);
          }
        }

        showMessage("Appeal decision saved successfully.", "success");
        await loadAppeals();
      } catch (error) {
        console.error("Save decision error:", error);
        showMessage(error.message || "An unexpected error occurred while saving the decision.", "error");
      } finally {
        button.disabled = false;
        button.textContent = "Save Decision";
      }
    }

    dashboardBtn.addEventListener("click", () => {
      window.location.href = "dashboard.html";
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        await signOut(auth);
        window.location.href = "login.html";
      } catch (error) {
        console.error("Logout error:", error);
        showMessage("Could not log out right now.", "error");
      }
    });

    onAuthStateChanged(auth, async (firebaseUser) => {
      if (!firebaseUser) {
        window.location.href = "login.html";
        return;
      }

      try {
        currentPortalUser = await loadPortalUser(firebaseUser);

        if (!currentPortalUser) {
          return;
        }

        loadingScreen.classList.add("hidden");
        appEl.classList.remove("hidden");
        await loadAppeals();
      } catch (error) {
        console.error("Initialization error:", error);
        loadingScreen.textContent = "Failed to load appeals.";
      }
    });
  </script>
</body>
</html>
