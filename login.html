<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Portal Login</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.24);
      padding: 34px 30px;
    }

    h1 {
      margin: 0 0 10px 0;
      text-align: center;
      color: #111827;
      font-size: 30px;
    }

    .subtitle {
      margin: 0 0 28px 0;
      text-align: center;
      color: #6b7280;
      font-size: 15px;
      line-height: 1.6;
    }

    .field-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 700;
      color: #1f2937;
      font-size: 14px;
    }

    input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .submit-btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      color: #ffffff;
      background: #2563eb;
      cursor: pointer;
      transition: background 0.15s ease;
      margin-top: 8px;
    }

    .submit-btn:hover {
      background: #1d4ed8;
    }

    .submit-btn:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }

    .message {
      display: none;
      margin-top: 18px;
      padding: 13px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.success {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .message.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .footer-note {
      margin-top: 20px;
      text-align: center;
      color: #6b7280;
      font-size: 13px;
      line-height: 1.5;
    }

    .link-wrap {
      text-align: center;
      margin-top: 18px;
    }

    .link-wrap a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      margin: 0 8px;
    }

    .link-wrap a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .card {
        padding: 26px 20px;
      }

      h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign In</h1>
    <p class="subtitle">
      Sign in to access your employee portal, view records, and manage your account.
    </p>

    <form id="loginForm">
      <div class="field-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" maxlength="120" required />
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required />
      </div>

      <button type="submit" id="loginBtn" class="submit-btn">Sign In</button>
    </form>

    <div id="messageBox" class="message"></div>

    <div class="footer-note">
      Your account must be approved and activated before sign in will work.
    </div>

    <div class="link-wrap">
      <a href="index.html">Back to Home</a>
      <a href="signup.html">Request Access</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      updateDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDE0nhogdC9LHPEhSlUF1AqnXmwPU64cXg",
      authDomain: "company-discipline-portal.firebaseapp.com",
      projectId: "company-discipline-portal",
      storageBucket: "company-discipline-portal.firebasestorage.app",
      messagingSenderId: "991390225414",
      appId: "1:991390225414:web:32b8d71a8fe2a323161f87"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginForm = document.getElementById("loginForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const messageBox = document.getElementById("messageBox");

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.className = `message ${type}`;
    }

    function clearMessage() {
      messageBox.textContent = "";
      messageBox.className = "message";
    }

    function normalizeEmail(value) {
      return value.trim().toLowerCase();
    }

    function getFriendlyAuthError(errorCode) {
      switch (errorCode) {
        case "auth/invalid-email":
          return "The email address is invalid.";
        case "auth/missing-password":
          return "Please enter your password.";
        case "auth/user-disabled":
          return "This account has been disabled.";
        case "auth/user-not-found":
        case "auth/invalid-credential":
        case "auth/wrong-password":
          return "The email or password is incorrect.";
        case "auth/too-many-requests":
          return "Too many failed attempts were detected. Please try again later.";
        default:
          return "Sign in failed. Please try again.";
      }
    }

    function getDashboardPathByRole(role) {
      return "dashboard.html";
    }

    async function handleSuccessfulLogin(userCredential) {
      const uid = userCredential.user.uid;
      const userRef = doc(db, "users", uid);
      const userSnap = await getDoc(userRef);

      if (!userSnap.exists()) {
        await signOut(auth);
        throw new Error("No portal user record was found for this account.");
      }

      const userData = userSnap.data();

      if ((userData.status || "").toLowerCase() !== "active") {
        await signOut(auth);
        throw new Error("This portal account is not active.");
      }

      await updateDoc(userRef, {
        lastLoginAt: serverTimestamp()
      });

      const redirectPath = getDashboardPathByRole(userData.role);
      window.location.href = redirectPath;
    }

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearMessage();

      const email = normalizeEmail(emailInput.value);
      const password = passwordInput.value;

      if (!email || !password) {
        showMessage("Please enter your email address and password.", "error");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "Signing In...";

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        await handleSuccessfulLogin(userCredential);
      } catch (error) {
        console.error("Login error:", error);

        if (error.code) {
          showMessage(getFriendlyAuthError(error.code), "error");
        } else {
          showMessage(error.message || "An unexpected error occurred during sign in.", "error");
        }
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Sign In";
      }
    });
  </script>
</body>
</html>
